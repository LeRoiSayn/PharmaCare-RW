version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: pharmacare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharmacare
      POSTGRES_USER: pharmacare
      POSTGRES_PASSWORD: pharmacare123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacare"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacare_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pharmacare:pharmacare123@db:5432/pharmacare?schema=public
      JWT_SECRET: super-secret-jwt-key-change-in-production-2025
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production-2025
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      BASE_URL: http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: pharmacare_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
